name: RCPL ARPIT CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Pre-checks (PARALLEL) — lint + typecheck
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint

  lint-backend:
    name: Lint & Typecheck Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: npx tsc --noEmit

  # JOB 2: Tests (SEQUENTIAL — depends on Job 1)
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: backend/package-lock.json }
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/

  # JOB 3: Build (SEQUENTIAL — depends on Job 2)
  build:
    name: Build Frontend & Backend
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build Frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build Backend
        working-directory: backend
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

  # JOB 4: Security Audit (PARALLEL — runs alongside tests)
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Audit Frontend Dependencies
        working-directory: frontend
        run: npm ci && npm audit --audit-level=high
      - name: Audit Backend Dependencies
        working-directory: backend
        run: npm ci && npm audit --audit-level=high
      - name: Check for secrets
        run: |
          if grep -rn "sk-ant-" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules; then
            echo "ERROR: Potential API key found in source code!"; exit 1
          fi
          echo "No secrets detected."
